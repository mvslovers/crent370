name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - feature/ci-pipeline

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mvs:
        image: ghcr.io/mvslovers/mvsce-builder:latest
        ports:
          - 3270:3270
          - 1080:1080

    steps:
      - uses: actions/checkout@v4

      - name: Install c2asm370
        run: |
          curl -fsSL -o /tmp/c2asm370.tar.gz \
            https://github.com/mvslovers/c2asm370/releases/download/v1.2/c2asm370-linux-x86.tar.gz
          sudo tar xzf /tmp/c2asm370.tar.gz -C /usr/local/bin
          sudo chmod +x /usr/local/bin/c2asm370
          sudo apt-get update && sudo apt-get install -y libc6-i386

      - name: Configure .env
        run: cp .env.example .env

      - name: Wait for MVS IPL
        run: |
          echo "Waiting for mvsMF API..."
          for i in $(seq 1 60); do
            if curl -sf -u IBMUSER:sys1 http://localhost:1080/zosmf/info >/dev/null 2>&1; then
              echo "mvsMF ready after ~${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "mvsMF not ready after 60s"
          exit 1

      - name: Build
        run: make
